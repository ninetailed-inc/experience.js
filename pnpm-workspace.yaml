packages:
  - packages/*

# pnpm 11: allowBuilds replaces onlyBuiltDependencies / neverBuiltDependencies
allowBuilds:
  '@parcel/watcher': true
  '@swc/core': true
  core-js: true
  core-js-pure: true
  cypress: true
  esbuild: true
  es5-ext: true
  less: true
  lmdb: true
  msgpackr-extract: true
  nx: true
  sharp: true
  unrs-resolver: true

overrides:
  minimatch@7: 7.4.8
  underscore: 1.13.8
  '@types/react': 19.2.14
  '@contentful/rich-text-types': 17.2.5
